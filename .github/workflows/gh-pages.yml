name: Deploy Hexo to GitHub Pages

on:
  push:
    branches:
      - main  # 监听 main 分支的推送
    paths-ignore:  # 新增：忽略不必要的文件变更
      - '.gitignore'
      - 'README.md'
      - 'LICENSE'
      - '.github/**'  # 避免 Actions 文件自身变更触发

# 并发控制：如果多个推送同时发生，取消正在进行的旧任务
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:  # 新增：输出构建时间，便于调试
      build_time: ${{ steps.build-time.outputs.time }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive  # 如果你用 git submodule 管理主题
          fetch-depth: 1  # 新增：只拉取最新代码，加快速度

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # 简化写法，使用 LTS 版本
          cache: 'npm'  # 新增：自动缓存 npm 依赖

      - name: Install dependencies
        run: |
          # 直接使用 npm install，避免 lockfile 同步问题
          npm install
          if [ -d "themes/amazingremake" ]; then
            cd themes/amazingremake && npm install
          fi

      - name: Record build time  # 新增：记录构建时间
        id: build-time
        run: echo "time=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Clean and build
        run: |
          npx hexo clean
          npx hexo generate

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      # 新增：可选的通知，可以在仓库的 Actions 页面看到部署信息
      - name: Display deployment info
        run: |
          echo "✅ Deployment completed!"
          echo "📅 Build time: ${{ needs.build.outputs.build_time }}"
          echo "🔗 Page URL: ${{ steps.deployment.outputs.page_url }}"
